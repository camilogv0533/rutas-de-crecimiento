name: Content weekly

on:
  schedule:
    - cron: '45 15 * * 3'  # Wed 10:45am Guayaquil (UTC-5)
    - cron: '45 15 * * 6'  # Sat 10:45am Guayaquil (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rutas-write
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Avisar plan a Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG=$(printf '🟡 Redactor semanal quiere correr\nVa a: generar borradores nuevos en content/drafts/ (Sonnet, no publica)\nAprueba para ejecutar — "Review deployments" en:\n%s' "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"

  run:
    needs: announce
    environment: aprobacion
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/init_db.py
      - name: Generate weekly drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '6.5'
        run: python scripts/content_gen.py --weekly
      - name: Commit drafts
        run: |
          git config user.name "rutas-bot"
          git config user.email "bot@rutasdecrecimiento.com"
          git add content/drafts/ data/retreats.db || true
          git diff --staged --quiet || git commit -m "content weekly $(date -u +%Y-%m-%d)"
          git push
      - name: Notificacion Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          ICON="✅"; [ "$JOB_STATUS" != "success" ] && ICON="❌"
          MSG=$(printf '%s Redactor semanal — borradores en content/drafts/\nEstado: %s\n%s\nSitio: https://rutas-de-crecimiento.pages.dev' "$ICON" "$JOB_STATUS" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"
