name: Recordatorio kit quincenal

# El kit (carrusel, estáticas, tiktokslide.mp4, video, threads, long post) se genera
# LOCALMENTE en el Content Studio (Streamlit) — son binarios pesados y requieren
# revisión visual. Este workflow solo RECUERDA que es día de kit.

on:
  schedule:
    - cron: '45 15 1 * *'   # Día 1, 10:45am Guayaquil (UTC-5)
    - cron: '45 15 15 * *'  # Día 15, 10:45am Guayaquil (UTC-5)
  workflow_dispatch:

jobs:
  recordar:
    runs-on: ubuntu-latest
    steps:
      - name: Recordatorio a Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG=$(printf '🗓️ Día de kit quincenal\nAbre el Content Studio y genera el kit con los 2 blogs recientes:\n\n  streamlit run admin/streamlit_admin.py\n\nPestaña "🎬 Content Studio" → Generar kit → revisar → copiar-pegar a redes.')
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"
