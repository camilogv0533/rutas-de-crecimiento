name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_run:
    # Deploy automático cuando termina cualquier workflow que commitea a main.
    # GitHub no dispara 'push' desde commits del bot (anti-loop), por eso workflow_run.
    workflows:
      - "Scrape weekly"
      - "Content weekly"
      - "Content quincenal"
      - "Mastermind weekly"
      - "CEO Operaciones"
      - "CEO Marketing"
      - "SEO audit weekly"
      - "CEO UX"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pip install -r requirements.txt
      - run: python scripts/init_db.py
      - run: python scripts/build_export.py
      - name: Build Astro
        working-directory: site
        env:
          SITE_BASE_URL: https://rutasdecrecimiento.com
        run: |
          npm ci
          npm run build
      - name: Create Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages project create rutas-de-crecimiento --production-branch=main || true
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: rutas-de-crecimiento
          directory: site/dist
          branch: main
