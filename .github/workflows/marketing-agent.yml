name: CEO Marketing

on:
  schedule:
    - cron: '0 14 * * 4'  # Thu 9am Ecuador (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  marketing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/init_db.py
      - name: Publish approved drafts + gen social
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '6.5'
        run: python scripts/marketing_agent.py
      - name: Commit published content
        run: |
          git config user.name "rutas-bot"
          git config user.email "bot@rutasdecrecimiento.com"
          git add site/src/content/blog/ data/social_ready/ data/retreats.db || true
          git diff --staged --quiet || git commit -m "marketing: publish drafts $(date -u +%Y-%m-%d)"
          git push
      - name: Notificacion Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          ICON="✅" && [ "$JOB_STATUS" != "success" ] && ICON="❌"
          MSG="$ICON CEO Marketing — drafts publicados + social copy listo
Estado: $JOB_STATUS
$RUN_URL
Sitio: https://rutas-de-crecimiento.pages.dev"
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"