name: Master queue ingest

# Ingiere semanalmente retiros de desarrollo de habilidades desde data/master_queue.json
# (lista curada del Excel "0 Master") EN ORDEN + 1 referente aleatorio que ya hace retiros.
# El gate de relevancia (is_skill_development_retreat en scraper.py) descarta idiomas,
# conferencias, debate, educator PD y wellness puro.

on:
  schedule:
    - cron: '28 16 * * 3'  # Miércoles 11:28am Guayaquil (UTC-5)
  workflow_dispatch:
    inputs:
      master:
        description: 'Candidatos curados (en orden) a ingerir'
        default: '3'
      referent:
        description: 'Referentes aleatorios a ingerir'
        default: '1'

permissions:
  contents: write

concurrency:
  group: rutas-write
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Avisar plan a Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG=$(printf '🟡 Master ingest quiere correr\nVa a: añadir 3 retiros curados (en orden) + 1 referente aleatorio del Excel master (Haiku, con gate de habilidades)\nAprueba para ejecutar — "Review deployments" en:\n%s' "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"

  run:
    needs: announce
    environment: aprobacion
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Sincronizar con main más reciente
        run: |
          git fetch origin main
          git reset --hard origin/main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -r requirements.txt
      - name: Init DB
        run: python scripts/init_db.py && python scripts/seed_skills.py && python scripts/seed_destinations.py
      - name: Ingest desde master_queue (en orden + referente aleatorio)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '4'
        run: python scripts/queue_ingest.py --master ${{ github.event.inputs.master || '3' }} --referent ${{ github.event.inputs.referent || '1' }}
      - name: Classify new
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '4'
        run: python scripts/classify.py --all
      - name: Imagen IA propia por retiro nuevo (Gemini Flash Image, ~$0.039 c/u)
        # Solo IA generada por nosotros — 0 riesgo de copyright. No usamos fotos ajenas.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MONTHLY_BUDGET_USD: '4'
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            python scripts/image_gen.py || true
          else
            echo "Sin GEMINI_API_KEY — retiros nuevos quedan con gradiente CSS."
          fi
      - name: Build export
        run: python scripts/build_export.py
      - name: Commit DB + content + queue
        run: |
          git config user.name "rutas-bot"
          git config user.email "bot@rutasdecrecimiento.com"
          git add data/retreats.db data/master_queue.json site/src/content/ site/public/img/retreats/ || true
          git diff --staged --quiet && echo "sin cambios" && exit 0
          git commit -m "master ingest $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rechazado, reintento $i"; sleep 5
          done
          exit 1
      - name: Notificacion Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          ICON="✅"; [ "$JOB_STATUS" != "success" ] && ICON="❌"
          MSG=$(printf '%s Master ingest — hecho\nEstado: %s\n%s\nSitio: https://rutas-de-crecimiento.pages.dev' "$ICON" "$JOB_STATUS" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"
