name: Mastermind weekly

on:
  schedule:
    - cron: '45 15 * * 3'  # Mié 10:45am Guayaquil (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rutas-write
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Avisar plan a Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG=$(printf '🟡 Mastermind scraper quiere correr\nVa a: buscar y añadir masterminds presenciales nuevos\nAprueba — "Review deployments" en:\n%s' "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"

  run:
    needs: announce
    environment: aprobacion
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Sincronizar con main más reciente
        run: |
          git fetch origin main
          git reset --hard origin/main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -r requirements.txt
      - name: Init DB
        run: python scripts/init_db.py && python scripts/seed_skills.py && python scripts/seed_destinations.py
      - name: Discover masterminds via Tavily
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/discover.py --limit 5 --query-override "mastermind retreat presencial viaje 2026" || true
      - name: Scrape mastermind sources + discovered
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '4'
        run: python scripts/scraper.py --batch --sources-filter mastermind --include-discovered --limit 20
      - name: Classify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '4'
        run: python scripts/classify.py --all
      - name: Generar imágenes IA para nuevos masterminds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MONTHLY_BUDGET_USD: '4'
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            python scripts/image_gen.py || true
          fi
      - name: Build export
        run: python scripts/build_export.py
      - name: Commit
        run: |
          git config user.name "rutas-bot"
          git config user.email "bot@rutasdecrecimiento.com"
          git add data/retreats.db site/src/content/ site/public/img/retreats/ data/discovered_urls.json || true
          git diff --staged --quiet && echo "sin cambios" && exit 0
          git commit -m "mastermind weekly $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rechazado, reintento $i"; sleep 5
          done
          exit 1
      - name: Notificacion Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          ICON="✅"; [ "$JOB_STATUS" != "success" ] && ICON="❌"
          MSG=$(printf '%s Mastermind scraper — hecho\nEstado: %s\n%s' "$ICON" "$JOB_STATUS" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"
