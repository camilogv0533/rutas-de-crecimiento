name: CEO Operaciones

on:
  schedule:
    - cron: '45 15 * * 2'  # Tue 10:45am Guayaquil (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rutas-write
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Avisar plan a Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG=$(printf '🟡 CEO Operaciones quiere correr\nVa a: evaluar y enriquecer hasta 20 retiros pendientes (Haiku/Sonnet)\nAprueba para ejecutar — "Review deployments" en:\n%s' "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"

  run:
    needs: announce
    environment: aprobacion
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/init_db.py
      - name: Evaluar y enriquecer retiros
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '6.5'
        run: python scripts/ops_agent.py --limit 20
      - name: Export y commit
        run: |
          python scripts/build_export.py
          git config user.name "rutas-bot"
          git config user.email "bot@rutasdecrecimiento.com"
          git add data/ site/src/content/ || true
          git diff --staged --quiet || git commit -m "ops: enrich retreats $(date -u +%Y-%m-%d)"
          git push
      - name: Notificacion Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          ICON="✅"; [ "$JOB_STATUS" != "success" ] && ICON="❌"
          MSG=$(printf '%s CEO Operaciones — hecho\nEstado: %s\n%s\nSitio: https://rutas-de-crecimiento.pages.dev' "$ICON" "$JOB_STATUS" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"
