name: CEO Operaciones

on:
  schedule:
    - cron: '0 7 * * 2'  # Tue 7am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ops:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/init_db.py
      - name: Evaluar y enriquecer retiros
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '5'
        run: python scripts/ops_agent.py --limit 20
      - name: Export y commit
        run: |
          python scripts/build_export.py
          git config user.name "rutas-bot"
          git config user.email "bot@rutasdecrecimiento.com"
          git add data/ site/src/content/ || true
          git diff --staged --quiet || git commit -m "ops: enrich retreats $(date -u +%Y-%m-%d)"
          git push
