name: Scrape weekly

on:
  schedule:
    - cron: '45 15 * * 1'  # Mon 10:45am Guayaquil (UTC-5)
    - cron: '45 15 * * 4'  # Thu 10:45am Guayaquil (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rutas-write
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Avisar plan a Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG=$(printf '🟡 Scraper semanal quiere correr\nVa a: descubrir y extraer retiros nuevos (Haiku)\nAprueba para ejecutar — "Review deployments" en:\n%s' "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"

  run:
    needs: announce
    environment: aprobacion
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Sincronizar con main más reciente
        run: |
          git fetch origin main
          git reset --hard origin/main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install -r requirements.txt
      - name: Init DB
        run: python scripts/init_db.py && python scripts/seed_skills.py && python scripts/seed_destinations.py
      - name: Discover
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python scripts/discover.py --limit 3 || true
      - name: Scrape batch
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '4'
        run: python scripts/scraper.py --batch --include-discovered --limit 25
      - name: Classify new
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '4'
        run: python scripts/classify.py --all
      - name: Imagen IA propia por retiro nuevo (gpt-image-1, ~$0.06 c/u)
        # Solo IA generada por nosotros — 0 riesgo de copyright. No usamos fotos ajenas.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MONTHLY_BUDGET_USD: '4'
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            python scripts/image_gen.py || true
          else
            echo "Sin OPENAI_API_KEY — retiros nuevos quedan con gradiente CSS."
          fi
      - name: Build export
        run: python scripts/build_export.py
      - name: Commit DB + content
        run: |
          git config user.name "rutas-bot"
          git config user.email "bot@rutasdecrecimiento.com"
          git add data/retreats.db site/src/content/ site/public/img/retreats/ data/discovered_urls.json || true
          git diff --staged --quiet && echo "sin cambios" && exit 0
          git commit -m "scrape weekly $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push rechazado, reintento $i"; sleep 5
          done
          exit 1
      - name: Notificacion Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          ICON="✅"; [ "$JOB_STATUS" != "success" ] && ICON="❌"
          MSG=$(printf '%s Scraper semanal — hecho\nEstado: %s\n%s\nSitio: https://rutas-de-crecimiento.pages.dev' "$ICON" "$JOB_STATUS" "$RUN_URL")
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"
