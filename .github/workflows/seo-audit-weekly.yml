name: SEO audit weekly

on:
  schedule:
    - cron: '0 14 * * 6'  # Sat 9am Ecuador (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pip install -r requirements.txt
      - run: python scripts/init_db.py
      - name: Build site
        working-directory: site
        run: |
          npm ci
          npm run build
      - run: python scripts/seo_audit.py
      - name: Commit findings
        run: |
          git config user.name "rutas-bot"
          git config user.email "bot@rutasdecrecimiento.com"
          git add .claude/findings.md || true
          git diff --staged --quiet || git commit -m "seo audit $(date -u +%Y-%m-%d)"
          git push
      - name: Notificacion email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: camilo.gutierrezing33@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: camilo.gutierrezing33@gmail.com
          from: Rutas Bot <camilo.gutierrezing33@gmail.com>
          subject: "[${{ job.status == 'success' && '✅' || '❌' }}] SEO Audit — ${{ github.run_id }}"
          body: |
            Auditoría SEO semanal completada.
            Revisar hallazgos en .claude/findings.md

            Estado: ${{ job.status }}
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            — Rutas Bot
