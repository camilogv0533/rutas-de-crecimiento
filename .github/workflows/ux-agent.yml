name: CEO UX

on:
  schedule:
    - cron: '0 14 * * 0'  # Sun 9am Ecuador (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/init_db.py
      - name: Analizar gaps y enriquecer skills
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '5'
        run: python scripts/ux_agent.py
      - name: Export y commit
        run: |
          python scripts/build_export.py
          git config user.name "rutas-bot"
          git config user.email "bot@rutasdecrecimiento.com"
          git add data/ site/src/content/ .claude/findings.md || true
          git diff --staged --quiet || git commit -m "ux: gaps analysis $(date -u +%Y-%m-%d)"
          git push
      - name: Notificacion email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: camilo.gutierrezing33@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: camilo.gutierrezing33@gmail.com
          from: Rutas Bot <camilo.gutierrezing33@gmail.com>
          subject: "[${{ job.status == 'success' && '✅' || '❌' }}] CEO UX — ${{ github.run_id }}"
          body: |
            CEO de UX corrió hoy. Revisar wishlist y gaps detectados en:
            data/wishlist.md y data/ux_report_$(date -u +%Y-%m-%d).md

            Estado: ${{ job.status }}
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            — Rutas Bot
