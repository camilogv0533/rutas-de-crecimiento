name: CEO UX

on:
  schedule:
    - cron: '0 14 * * 0'  # Sun 9am Ecuador (UTC-5)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/init_db.py
      - name: Analizar gaps y enriquecer skills
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTHLY_BUDGET_USD: '5'
        run: python scripts/ux_agent.py
      - name: Export y commit
        run: |
          python scripts/build_export.py
          git config user.name "rutas-bot"
          git config user.email "bot@rutasdecrecimiento.com"
          git add data/ site/src/content/ .claude/findings.md || true
          git diff --staged --quiet || git commit -m "ux: gaps analysis $(date -u +%Y-%m-%d)"
          git push
      - name: Notificacion Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          ICON="✅" && [ "$JOB_STATUS" != "success" ] && ICON="❌"
          MSG="$ICON CEO UX — wishlist y gaps en data/ux\_report
Estado: $JOB_STATUS
$RUN_URL"
          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d "chat_id=$CHAT_ID" \
            --data-urlencode "text=$MSG"